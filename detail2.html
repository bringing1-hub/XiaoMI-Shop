<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小米商城 - 商品详情</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container nav-box">
            <a class="logo" href="index.html">小米商城</a>
            <nav class="main-nav">
                <a href="index.html">首页</a>
                <a href="products.html">全部商品</a>
                <a class="active" href="detail.html">商品详情</a>
                <a href="cart.html">购物车</a>
                <a href="login.html">登录</a>
            </nav>
        </div>
    </header>

    <main class="container page-main">
        <section class="detail-box">
            <div class="detail-image">
                <div class="big-product-img"><img src="images\pms_1730124020.85532513.png" alt="Xiaomi 15" class="phone-img"></div>
            </div>

            <div class="detail-info">
                <h1>Redmi K80</h1>
                <p class="detail-desc">超强性能，超长续航。搭载高性能芯片，配备大容量电池，畅快体验每一刻。</p>
                <p class="detail-price">2499 元起</p>

                <div class="option-group">
                    <h3>选择版本</h3>
                    <div class="option-list" data-group="ram">
                        <button class="option-btn active" type="button">12GB + 256GB</button>
                        <button class="option-btn" type="button">12GB + 512GB</button>
                        <button class="option-btn" type="button">16GB + 1TB</button>
                    </div>
                </div>

                <div class="option-group">
                    <h3>选择颜色</h3>
                    <div class="option-list" data-group="color">
                        <button class="option-btn active" type="button" data-img="images\pms_1730124020.85532513.png">玄夜黑</button>
                        <button class="option-btn" type="button" data-img="images\pms_1730124020.81653464.png">雪域白</button>
                        <button class="option-btn" type="button" data-img="images\pms_1730124020.81975836.png">浅野绿</button>
                    </div>
                </div>

                <div class="detail-actions">
                    <a class="buy-button" href="cart.html">加入购物车</a>
                    <a class="back-button" href="products.html">返回列表</a>
                </div>
            </div>
        </section>

        <section class="detail-params">
            <h2>商品参数</h2>
            <ul>
                <li>屏幕：第二代 2K 护眼屏，120Hz 高刷新率</li>
                <li>处理器：骁龙旗舰级处理器</li>
                <li>影像：5000万像素超清主摄，支持 OIS 光学防抖</li>
                <li>续航：6550mAh 超大电池，支持 90W 快充</li>
            </ul>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">小米商城前端仿站实训项目</div>
    </footer>

    <script src="js/main.js"></script>
    <script>const imgBox = document.querySelector('.phone-img');

// 处理内存版本按钮
const ramBtns = document.querySelectorAll('[data-group="ram"] .option-btn');
ramBtns.forEach(btn => {
  btn.onclick = function(){
    ramBtns.forEach(b => b.classList.remove('active'));
    this.classList.add('active');
  }
})

// 处理颜色按钮（切换图片+本组选中）
const colorBtns = document.querySelectorAll('[data-group="color"] .option-btn');
colorBtns.forEach(btn => {
  btn.onclick = function(){
    colorBtns.forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    imgBox.src = this.dataset.img;
  }
})</script>
</body>
</html>
